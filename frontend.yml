apiVersion: apps/v1
kind: Deployment
metadata:
  name: grow-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grow-frontend
  template:
    metadata:
      labels:
        app: grow-frontend
    spec:
      containers:
        - name: grow-frontend
          image: jjwon0407/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    app: grow-frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173